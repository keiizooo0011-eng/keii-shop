<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Top Up & Produk Digital — KivoPay</title>
  <link rel="stylesheet" href="style.css?v=20.2">
  <link rel="stylesheet" href="game.css?v=20.2">
</head>
<body class="game-page">
<header class="game-head">
  <a href="index.html" class="brand"><span class="mark">K</span><span>KivoPay</span></a>
  <a href="index.html" class="game-back">← Kembali</a>
</header>
<main class="game-shell">
  <section class="catalog-banner">
    <span class="eyebrow">TOP UP OTOMATIS</span>
    <h1>Top Up Game & Produk Digital</h1>
    <p>Pilih katalog, tentukan produk, lalu bayar aman dengan QRIS KivoPay.</p>
  </section>

  <nav id="categoryTabs" class="category-tabs" aria-label="Kategori produk">
    <button class="category-tab active" data-category="games">Games</button>
    <button class="category-tab" data-category="streaming">Streaming</button>
    <button class="category-tab" data-category="voucher">Voucher</button>
    <button class="category-tab" data-category="lainnya">Lainnya</button>
  </nav>

  <section class="catalog-section">
    <div class="catalog-title-row">
      <div>
        <span class="eyebrow" id="categoryEyebrow">KATALOG</span>
        <h2 id="categoryTitle">Game Populer</h2>
      </div>
      <label class="catalog-search">
        <span>⌕</span>
        <input id="gameSearch" placeholder="Cari produk..." autocomplete="off">
      </label>
    </div>
    <div id="gameGrid" class="vip-grid"><p class="catalog-loading">Memuat katalog...</p></div>
  </section>
</main>
<script src="game.js?v=20.2"></script>
</body>
</html>
