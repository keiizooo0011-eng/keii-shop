<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Top Up Game — KivoPay</title><link rel="stylesheet" href="style.css?v=20"><link rel="stylesheet" href="game.css?v=20"><script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" defer></script></head><body>
<header class="game-head"><a href="index.html" class="brand"><span class="mark">K</span><span>KivoPay</span></a><a href="index.html">← Kembali</a></header>
<main class="game-shell"><section class="game-hero"><span class="eyebrow">TOP UP OTOMATIS</span><h1>Top Up Game</h1><p>Pilih game, isi ID tujuan, lalu bayar dengan QRIS KivoPay.</p></section>
<section><div class="game-section-head"><div><h2>Game Populer</h2><p>Pilih salah satu game untuk melihat paket yang tersedia.</p></div><input id="gameSearch" placeholder="Cari game..."></div><div id="gameGrid" class="game-grid"><p>Memuat katalog...</p></div></section>
<section id="gameCheckout" class="game-checkout" hidden><button id="closeGameCheckout" class="close-game" type="button">×</button><div class="game-checkout-head"><img id="selectedGameImage" alt=""><div><span class="eyebrow">CHECKOUT GAME</span><h2 id="selectedGameName">Game</h2><p id="selectedGameInfo">Pilih paket dan isi data tujuan.</p></div></div>
<form id="gameOrderForm"><label>Pilih paket</label><select id="gameService" required></select><div class="game-two"><div><label>User ID / ID tujuan</label><input id="gameTarget" required placeholder="Masukkan ID"></div><div><label>Zone / Server</label><input id="gameZone" placeholder="Kosongkan jika tidak ada"></div></div><button id="checkNicknameBtn" class="secondary-btn" type="button">Cek Nickname</button><div id="nicknameResult" class="nickname-result"></div><div class="game-two"><div><label>Nama pembeli</label><input id="gameCustomerName" required></div><div><label>WhatsApp / Telegram</label><input id="gameCustomerContact" required></div></div><div class="game-price"><span>Total paket</span><strong id="gameSellPrice">Rp0</strong></div><button id="submitGameOrder" type="submit">Buat QRIS</button><div id="gameFormMessage" class="admin-message"></div></form></section></main>
<script src="game.js?v=20"></script></body></html>
