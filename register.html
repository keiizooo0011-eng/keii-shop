<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0b0712"><title>Daftar — KivoPay</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="auth.css?v=20260724-4">
<script>
(async function clearOldKivoPayCache() {
  try {
    if ('serviceWorker' in navigator) {
      const registrations = await navigator.serviceWorker.getRegistrations();
      await Promise.all(registrations.map(registration => registration.unregister()));
    }
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(key => caches.delete(key)));
    }
  } catch (error) {
    console.warn('Cache cleanup skipped:', error);
  }
})();
</script>

</head><body><div class="auth-aurora a"></div><div class="auth-aurora b"></div><main class="auth-shell"><a class="auth-brand" href="index.html"><span>K</span><strong>KivoPay</strong></a><section class="auth-card"><div class="auth-head"><small>KIVOPAY ACCOUNT</small><h1>Buat akun KivoPay.</h1><p>Daftar sekali untuk menyimpan riwayat transaksi dan tiket bantuan dalam satu akun.</p></div><form id="registerForm" class="auth-form"><label>Nama lengkap<input id="fullName" type="text" autocomplete="name" placeholder="Nama lengkap" minlength="2" required></label><label>Username<input id="username" type="text" autocomplete="username" placeholder="username" pattern="[A-Za-z0-9_]{3,20}" required></label><label>Email<input id="email" type="email" autocomplete="email" placeholder="nama@email.com" required></label><label>Kata sandi<div class="password-wrap"><input id="password" type="password" autocomplete="current-password" placeholder="Masukkan kata sandi" minlength="6" required><button type="button" data-toggle-password>Lihat</button></div></label><label>Ulangi kata sandi<div class="password-wrap"><input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Ulangi kata sandi" minlength="6" required><button type="button" data-toggle-password>Lihat</button></div></label><label class="remember"><input id="terms" type="checkbox" required> Saya menyetujui ketentuan penggunaan KivoPay.</label><button class="auth-submit" type="submit"><span>Daftar Sekarang</span></button><p id="message" class="auth-message"></p></form><div class="auth-divider"><span>Sudah punya akun?</span></div><a class="auth-secondary" href="login.html">Masuk ke akun</a></section><p class="auth-foot">Setelah mendaftar, akun dapat digunakan untuk mengakses layanan dan dashboard KivoPay.</p></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="config.js"></script><script src="auth.js?v=20260724-4"></script><script src="register.js?v=20260724-4"></script
